<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout | ShopEasy</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#222;
padding:15px 8%;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo h2{
color:white;
}

.nav-links{
display:flex;
list-style:none;
gap:20px;
}

.nav-links a{
color:white;
text-decoration:none;
font-weight:bold;
}

.container{
width:450px;
background:white;
margin:50px auto;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.container h2{
text-align:center;
margin-bottom:25px;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

footer{
background:#222;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>

</head>

<body>

<header>

<nav class="navbar">

<div class="logo">

<h2>ShopEasy</h2>

</div>

<ul class="nav-links">

<li><a href="index.html">Home</a></li>
<li><a href="shop.html">Shop</a></li>
<li><a href="cart.html">Cart</a></li>

</ul>

</nav>

</header>

<div class="container">

<h2>Checkout</h2>

<form id="checkoutForm">

<input
type="text"
placeholder="Full Name"
required>

<input
type="email"
placeholder="Email"
required>

<input
type="text"
placeholder="Phone Number"
required>

<textarea
rows="4"
placeholder="Delivery Address"
required></textarea>

<button type="submit">

Place Order

</button>

</form>

</div>

<footer>

<h3>ShopEasy</h3>

<p>© 2026 ShopEasy. All Rights Reserved.</p>

</footer>

<script>

document.getElementById("checkoutForm").addEventListener("submit", function(e){

    e.preventDefault();

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    if(cart.length === 0){
        alert("Your cart is empty!");
        return;
    }

    let orders = JSON.parse(localStorage.getItem("orders")) || [];

    const order = {
        id: Date.now(),
        date: new Date().toLocaleString(),
        items: cart
    };

    orders.push(order);

    localStorage.setItem("orders", JSON.stringify(orders));

    localStorage.removeItem("cart");

    alert("🎉 Order Placed Successfully!");

    window.location.href = "order-history.html";

});

</script>

</body>
</html>
